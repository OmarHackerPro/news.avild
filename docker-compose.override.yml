# Dev overrides — automatically merged by Docker Compose.
# Mounts local source into containers so edits are live without rebuilding.
services:
  backend:
    depends_on:
      - kiber-embedder
    environment:
      DEBUG: "true"
      EMBEDDER_URL: "http://kiber-embedder:8001"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py
      - ./scripts:/app/scripts
      - avatar_uploads:/app/static/uploads/avatars
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  ingestion:
    depends_on:
      - kiber-embedder
    environment:
      EMBEDDER_URL: "http://kiber-embedder:8001"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"

  frontend:
    volumes:
      - ./templates:/usr/share/nginx/html
      - ./static:/usr/share/nginx/html/static

  kiber-embedder:
    build: ./services/embedder
    ports:
      - "8001:8001"
    volumes:
      - embedder-model-cache:/model-cache
    environment:
      TRANSFORMERS_CACHE: /model-cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["${OPENSEARCH_URL}"]'
      OPENSEARCH_USERNAME: "${OPENSEARCH_USER}"
      OPENSEARCH_PASSWORD: "${OPENSEARCH_PASSWORD}"
      # Remote OS uses a self-signed cert — skip verification
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      OPENSEARCH_SSL_VERIFICATIONMODE: none
    restart: unless-stopped

volumes:
  embedder-model-cache:
