<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Webhooks - CyberNews</title>
  <link rel="stylesheet" href="/static/css/main/main.css">
  <link rel="stylesheet" href="/static/css/layout/navbar.css">
  <link rel="stylesheet" href="/static/css/pages/webhooks.css">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <style>
    .navbar { display: flex !important; flex-direction: column !important; }
    .nav-bottom { display: flex !important; visibility: visible !important; opacity: 1 !important; min-height: 48px !important; }
    .nav-links { display: flex !important; visibility: visible !important; }
  </style>
  <script>
    (function() {
      try {
        if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('theme-light');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-bottom">
      <a href="index.html" class="nav-brand">
        <span class="brand-logo-box"><i class="fas fa-shield-alt brand-icon"></i></span>
        <span class="brand-text"><span class="brand-cyber">News.</span><span class="brand-news">avild</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html"><i class="fas fa-home nav-link-icon"></i> Home</a></li>
        <li><a href="search.html"><i class="fas fa-search nav-link-icon"></i> Search</a></li>
      </ul>
    </div>
  </nav>

  <main class="layout">
    <div class="content-area webhooks-page">
      <h1 id="webhooks-page-title"><i class="fas fa-plug"></i> <span data-i18n-key="webhooks.title">Webhook configuration</span></h1>

      <section class="webhook-section" aria-labelledby="create-title">
        <h2 id="create-title" class="webhook-section-title"><i class="fas fa-plus-circle"></i> <span data-i18n-key="webhooks.createTitle">Create webhook</span></h2>
        <form class="webhook-form" id="webhookForm" novalidate>
          <div class="form-row">
            <label for="webhookName"><span data-i18n-key="webhooks.nameLabel">Name</span> <span class="optional" data-i18n-key="webhooks.nameOptional">(optional)</span></label>
            <input type="text" id="webhookName" name="name" autocomplete="off" placeholder="e.g. My integration">
          </div>
          <div class="form-row">
            <label for="webhookUrl"><span data-i18n-key="webhooks.endpointLabel">Endpoint URL</span></label>
            <input type="url" id="webhookUrl" name="url" required placeholder="https://example.com/webhook" aria-describedby="urlHint urlError">
            <p id="urlHint" class="form-hint" data-i18n-key="webhooks.endpointHint">Must be HTTPS, no spaces.</p>
            <p id="urlError" class="form-error" role="alert" aria-live="polite" hidden></p>
          </div>
          <div class="form-row">
            <label><span data-i18n-key="webhooks.secretLabel">Secret / signing key</span></label>
            <div class="webhook-secret-row">
              <input type="text" id="webhookSecret" name="secret" readonly class="secret-masked" placeholder="Generate to copy once" aria-describedby="secretHint">
              <button type="button" id="webhookGenSecret" class="btn-test" data-i18n-key="webhooks.generateSecret">Generate</button>
              <button type="button" id="webhookCopySecret" class="btn-test" data-i18n-key="webhooks.copySecret" disabled>Copy (shown once)</button>
            </div>
            <p id="secretHint" class="form-hint">Recommended for verifying payloads. Masked after creation.</p>
          </div>
          <div class="form-row">
            <span class="webhook-section-title" style="margin-bottom: 0.5rem;"><span data-i18n-key="webhooks.eventsLabel">Event types</span></span>
            <div id="webhookEvents" class="webhook-events"></div>
          </div>
          <p class="webhook-retry-note" data-i18n-key="webhooks.payloadFormat">Payload format: JSON (versioned schema).</p>
          <p class="webhook-retry-note" data-i18n-key="webhooks.retryNote">Retry: exponential backoff (default). Override in API if needed.</p>
          <button type="submit" class="btn-primary" id="webhookSubmit" data-i18n-key="webhooks.createBtn">Create webhook</button>
        </form>
      </section>

      <section class="webhook-section" aria-labelledby="manage-title">
        <h2 id="manage-title" class="webhook-section-title"><i class="fas fa-list"></i> <span data-i18n-key="webhooks.manageTitle">Your webhooks</span></h2>
        <div id="webhookList" class="webhook-list">
          <!-- Empty state or cards injected by JS -->
        </div>
      </section>
    </div>
  </main>

  <script src="/static/js/data/translations.js"></script>
  <script src="/static/js/components/nav.js"></script>
  <script src="/static/js/components/language.js"></script>
  <script src="/static/js/components/theme.js"></script>
  <script src="/static/js/data/webhooks.js"></script>
  <script src="/static/js/features/webhooks-page.js"></script>
  <script src="/static/js/components/auth.js"></script>
</body>
</html>
