<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  {% include "_seo.html" %}
  <link rel="stylesheet" href="/static/css/main/main.css?v=6">
  <link rel="stylesheet" href="/static/css/layout/navbar.css?v=5">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <style>
    .navbar { display: flex; flex-direction: column; }
    .nav-top { display: flex; min-height: 44px; }
    .nav-bottom { display: grid; min-height: 48px; align-items: center; position: relative; }
    .nav-brand { flex-shrink: 0; }
    .nav-actions { display: flex; }
    .nav-links { display: flex; }

    .cs-page {
      min-height: calc(100vh - 100px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .cs-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      position: relative;
      overflow: hidden;
    }

    .cs-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
    }

    .cs-icon-wrap {
      width: 72px;
      height: 72px;
      background: rgba(63, 185, 80, 0.1);
      border: 1px solid rgba(63, 185, 80, 0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .cs-icon-wrap i {
      font-size: 1.75rem;
      color: var(--accent-green);
    }

    .cs-heading {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.6rem;
      letter-spacing: -0.01em;
    }

    .cs-sub {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .cs-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.4rem;
      background: rgba(63, 185, 80, 0.12);
      border: 1px solid rgba(63, 185, 80, 0.3);
      border-radius: 8px;
      color: var(--accent-green);
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .cs-back-btn:hover {
      background: rgba(63, 185, 80, 0.2);
      border-color: rgba(63, 185, 80, 0.5);
    }
  </style>
  <script>
    (function() {
      try {
        if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('theme-light');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  {% include "partials/components/coming-soon-banner.html" ignore missing %}

  <div class="page-wrapper">
    {% set _nav_include = "/static/partials/layout/nav.html" %}
    <nav class="navbar">
      <div class="nav-top">
        <div class="nav-actions" style="margin-left:auto">
        </div>
      </div>
      <div class="nav-bottom">
        <a href="/" class="nav-brand">
          <span class="brand-logo-box"><i class="fas fa-shield-alt brand-icon"></i></span>
          <span class="brand-text"><span class="brand-cyber">Cyber</span><span class="brand-news">News</span></span>
        </a>
      </div>
    </nav>

    <main class="cs-page">
      <div class="cs-card">
        <div class="cs-icon-wrap">
          <i class="fas fa-tools"></i>
        </div>
        <h1 class="cs-heading">Coming Soon</h1>
        <p class="cs-sub">This feature is currently under development.<br>We're working hard to bring it to you.</p>
        <a href="/" class="cs-back-btn">
          <i class="fas fa-arrow-left"></i> Back to news
        </a>
      </div>
    </main>
  </div>
</body>
</html>
