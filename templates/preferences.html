<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>My Stack — news.avild.com</title>
  <link rel="stylesheet" href="/static/css/main/main.css">
  <link rel="stylesheet" href="/static/css/layout/navbar.css?v=3">
  <link rel="stylesheet" href="/static/css/pages/preferences.css">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <style>
    .navbar { display: flex !important; flex-direction: column !important; }
    .nav-bottom { display: flex !important; align-items: center !important; position: relative !important; visibility: visible !important; opacity: 1 !important; min-height: 48px !important; }
    .nav-brand { flex-shrink: 0 !important; }
    .nav-links { display: flex !important; visibility: visible !important; position: absolute !important; left: 50% !important; transform: translateX(-50%) !important; overflow-x: visible !important; gap: 0.35rem !important; flex: 0 0 auto !important; white-space: nowrap !important; pointer-events: auto !important; }
  </style>
  <script>
    (function() {
      try {
        if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('theme-light');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-bottom">
      <a href="/" class="nav-brand">
        <span class="brand-logo-box"><i class="fas fa-shield-alt brand-icon"></i></span>
        <span class="brand-text"><span class="brand-avild">avild</span><span class="brand-news">.news</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="/"><i class="fas fa-home nav-link-icon"></i> Home</a></li>
        <li><a href="/search"><i class="fas fa-search nav-link-icon"></i> Search</a></li>
      </ul>
    </div>
  </nav>

  <main class="layout">
    <div class="content-area pref-page">
      <h1><i class="fas fa-layer-group"></i> <span data-i18n-key="pref.title">My Stack</span></h1>

      <!-- A. Topics -->
      <section class="pref-section" aria-labelledby="topics-title">
        <h2 id="topics-title" class="pref-section-title"><i class="fas fa-tags"></i> <span data-i18n-key="pref.topics">Topics</span></h2>
        <div id="prefTopicsGrid" class="pref-topics-grid"></div>
        <p class="pref-chip-hint" id="prefTopicsHint" data-i18n-key="pref.topicsHint">Select up to 5 topics. Click to toggle.</p>
      </section>

      <!-- B. Sources -->
      <section class="pref-section" aria-labelledby="sources-title">
        <h2 id="sources-title" class="pref-section-title"><i class="fas fa-rss"></i> <span data-i18n-key="pref.sources">Sources</span></h2>
        <p class="pref-chip-hint" style="margin-bottom: 0.5rem;" data-i18n-key="pref.sourcesHint">Choose which sources contribute to your feed.</p>
        <div id="prefSourcesList" class="pref-toggles"></div>
      </section>

      <!-- C. Content Type -->
      <section class="pref-section" aria-labelledby="content-type-title">
        <h2 id="content-type-title" class="pref-section-title"><i class="fas fa-file-alt"></i> <span data-i18n-key="pref.contentType">Content Type</span></h2>
        <div id="prefContentTypesList" class="pref-checkboxes"></div>
      </section>

      <!-- D. Signal Level -->
      <section class="pref-section" aria-labelledby="signal-title">
        <h2 id="signal-title" class="pref-section-title"><i class="fas fa-sliders-h"></i> <span data-i18n-key="pref.signalLevel">Signal Level</span></h2>
        <div class="pref-slider-labels">
          <span data-i18n-key="pref.signalLow">Low Noise</span>
          <span data-i18n-key="pref.signalHigh">High Signal</span>
        </div>
        <div class="pref-slider-wrap">
          <input type="range" id="prefSignalSlider" class="pref-slider" min="0" max="100" value="50" aria-label="Signal level">
        </div>
        <p class="pref-chip-hint" data-i18n-key="pref.signalHint">Trendy vs analytical · Surface-level vs deep · Popular vs niche.</p>
      </section>

      <div class="pref-actions">
        <button type="button" id="prefSaveBtn" class="pref-save-btn" data-i18n-key="pref.saveBtn">Save preferences</button>
        <span id="prefConfirm" class="pref-confirm" aria-live="polite"></span>
      </div>
    </div>
  </main>

  <script src="/static/js/data/translations.js"></script>
  <script src="/static/js/components/nav.js"></script>
  <script src="/static/js/components/language.js"></script>
  <script src="/static/js/components/theme.js"></script>
  <script src="/static/js/data/preferences.js"></script>
  <script src="/static/js/features/preferences-page.js"></script>
  <script src="/static/js/components/auth.js"></script>
</body>
</html>
