services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    volumes:
      - avatar_uploads:/usr/share/nginx/html/static/uploads/avatars
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      PROJECT_NAME: news.avild.com
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-password}@db:5432/avild_news
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      JWT_EXPIRE_MINUTES: "10080"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@kiber.info}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-}
      OPENSEARCH_USER: ${OPENSEARCH_USER:-}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-}
      NER_SIDECAR_URL: ${NER_SIDECAR_URL:-http://ner:8001}
      NER_ACTIVE_MODEL: ${NER_ACTIVE_MODEL:-haiku-4-5}
      NER_EVAL_ADMIN_SECRET: ${NER_EVAL_ADMIN_SECRET:-}
    volumes:
      - avatar_uploads:/app/static/uploads/avatars
    depends_on:
      - db

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-password}@db:5432/avild_news
      OPENSEARCH_URL: ${OPENSEARCH_URL:-}
      OPENSEARCH_USER: ${OPENSEARCH_USER:-}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-}
      NER_SIDECAR_URL: ${NER_SIDECAR_URL:-http://ner:8001}
      NER_ACTIVE_MODEL: ${NER_ACTIVE_MODEL:-haiku-4-5}
    depends_on:
      - db
      - ner
    command: >
      sh -c 'while true; do
        echo "=== Starting feed ingestion: $$(date -Iseconds) ===";
        python scripts/ingest_feeds.py;
        echo "=== Sleeping 1 hour ===";
        sleep 3600;
      done'

  waha:
    image: devlikeapro/waha
    restart: unless-stopped
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME:-admin}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:-}
      WHATSAPP_DEFAULT_ENGINE: ${WHATSAPP_DEFAULT_ENGINE:-NOWEB}
      WAHA_LOG_FORMAT: ${WAHA_LOG_FORMAT:-PRETTY}
      WAHA_PRINT_QR: ${WAHA_PRINT_QR:-True}
    volumes:
      - waha_sessions:/app/.sessions
    ports:
      - "3000:3000"

  briefing:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-password}@db:5432/avild_news
      OPENSEARCH_URL: ${OPENSEARCH_URL:-}
      OPENSEARCH_USER: ${OPENSEARCH_USER:-}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-}
      NER_SIDECAR_URL: ${NER_SIDECAR_URL:-http://ner:8001}
      NER_ACTIVE_MODEL: ${NER_ACTIVE_MODEL:-haiku-4-5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WAHA_URL: ${WAHA_URL:-http://waha:3000}
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WAHA_CHAT_ID: ${WAHA_CHAT_ID:-}
    volumes:
      - brief_outputs:/app/briefs
    depends_on:
      - db
      - waha
    command: >-
      sh -c 'while true; do
        SECS=$$(python3 -c "import datetime; now=datetime.datetime.now(datetime.timezone.utc); nxt=now.replace(hour=8,minute=0,second=0,microsecond=0); nxt=nxt+datetime.timedelta(days=1) if now>=nxt else nxt; print(max(int((nxt-now).total_seconds()),60))");
        echo "=== Sleeping $${SECS}s until next 08:00 UTC ===";
        sleep $$SECS;
        python scripts/send_daily_brief.py;
      done'

  ner:
    build:
      context: .
      dockerfile: Dockerfile.ner
    restart: unless-stopped
    environment:
      NER_MODEL_ID: attack-vector/SecureModernBERT-NER
      NER_MODEL_REVISION: ${NER_MODEL_REVISION:-main}
      NER_MAX_TOKENS: "4096"
      NER_CONFIDENCE_THRESHOLD: "0.5"
      NER_MODEL_VERSION: securebert-v1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    expose:
      - "8001"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: avild_news
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  avatar_uploads:
  brief_outputs:
  waha_sessions:
