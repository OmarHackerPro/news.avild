<!doctype html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — news.avild.com</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/main/main.css">
  <link rel="stylesheet" href="/static/css/auth-profile-bg.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"></noscript>
  <style>
    .profile-page { padding: 2rem 1.5rem; }
    .profile-card {
      position: relative; z-index: 1;
      max-width: 480px; margin: 0 auto;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow);
    }
    .profile-card h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--text); }
    .profile-avatar-wrap {
      display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.5rem;
    }
    .profile-avatar-img {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover; display: block; background: var(--bg-dark);
    }
    #avatarContainer.has-image .profile-avatar-placeholder { display: none !important; }
    #avatarContainer:not(.has-image) .profile-avatar-img { display: none !important; }
    .profile-avatar-placeholder {
      width: 80px; height: 80px; border-radius: 50%;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 2.5rem;
      border: none; outline: none; box-shadow: none;
    }
    .profile-avatar-placeholder i { opacity: 0.7; }
    #avatarContainer { border: none; outline: none; }
    .profile-form label { display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.35rem; }
    .profile-form input,
    .profile-form textarea { width: 100%; padding: 0.6rem 0.75rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 1rem; margin-bottom: 1rem; box-sizing: border-box; }
    .profile-form textarea { resize: vertical; min-height: 80px; font-family: inherit; }
    .profile-form input:focus,
    .profile-form textarea:focus { outline: none; border-color: var(--accent-blue); }
    .profile-form input[readonly] { opacity: 0.85; }
    .profile-form .password-wrap { position: relative; margin-bottom: 1rem; }
    .profile-form .password-wrap input { margin-bottom: 0; padding-right: 2.5rem; }
    .profile-form .password-toggle { position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.35rem; }
    .profile-form button[type="submit"] { padding: 0.6rem 1.2rem; background: var(--accent-green); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .profile-form button[type="submit"]:hover { background: #2ea043; }
    .profile-form .error { color: var(--accent-red); font-size: 0.9rem; margin-bottom: 0.75rem; }
    .profile-form .success { color: var(--accent-green); font-size: 0.9rem; margin-bottom: 0.75rem; }
    .profile-section { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .profile-section:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .profile-back { display: inline-block; margin-bottom: 1rem; color: var(--accent-blue); text-decoration: none; font-size: 0.9rem; }
    .profile-back:hover { text-decoration: underline; }
    .auth-hint { font-weight: normal; color: var(--text-muted); font-size: 0.85rem; }
    .profile-avatar-actions { display: flex; flex-direction: column; gap: 0.5rem; }
    .profile-avatar-upload-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.85rem; background: var(--bg-dark); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 0.85rem; cursor: pointer; transition: border-color 0.15s;
    }
    .profile-avatar-upload-btn:hover { border-color: var(--accent-blue); }
    .profile-avatar-remove-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.85rem; background: none; color: var(--accent-red);
      border: 1px solid var(--accent-red); border-radius: var(--radius-sm);
      font-size: 0.85rem; cursor: pointer; transition: background 0.15s;
    }
    .profile-avatar-remove-btn:hover { background: rgba(197,48,48,0.1); }
    .profile-logout-wrap { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
    .profile-logout-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1.2rem; background: #c53030; color: #fff;
      border: none; border-radius: var(--radius-sm); font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s ease;
    }
    .profile-logout-btn:hover { background: #9b2c2c; }
    .profile-logout-btn:focus { outline: none; box-shadow: 0 0 0 2px rgba(197, 48, 48, 0.5); }
  </style>
  <script>
    (function() {
      try { if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('theme-light'); } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="profile-page">
    <div class="auth-bg-dots" aria-hidden="true"></div>
    <div class="profile-card">
      <a href="/" class="profile-back"><i class="fas fa-arrow-left"></i> Back to home</a>
      <h1>My profile</h1>
      <div id="profileLoading" class="profile-section">Loading…</div>
      <div id="profileContent" hidden>
        <!-- Avatar -->
        <div class="profile-section profile-avatar-wrap">
          <div id="avatarContainer">
            <img id="avatarImg" class="profile-avatar-img" src="" alt="">
            <div id="avatarPlaceholder" class="profile-avatar-placeholder" aria-hidden="true"><i class="fas fa-user"></i></div>
          </div>
          <div class="profile-avatar-actions">
            <label>Profile picture</label>
            <label class="profile-avatar-upload-btn" for="avatarInput">
              <i class="fas fa-upload"></i> Upload photo
            </label>
            <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none;">
            <button type="button" class="profile-avatar-remove-btn" id="avatarRemoveBtn">
              <i class="fas fa-trash-alt"></i> Remove
            </button>
            <p class="auth-hint" style="margin:0;">JPEG, PNG, GIF or WebP, max 2MB</p>
          </div>
        </div>

        <!-- Profile form -->
        <form id="profileForm" class="profile-form">
          <div class="error" id="error" role="alert" hidden></div>
          <div class="success" id="success" role="status" hidden></div>

          <div class="profile-section">
            <label for="nameInput">Username</label>
            <input type="text" id="nameInput" name="name" required autocomplete="name">
          </div>

          <div class="profile-section">
            <label for="descriptionInput">Bio / Description</label>
            <textarea id="descriptionInput" name="description" placeholder="Tell others a bit about yourself…" maxlength="300"></textarea>
            <p class="auth-hint" style="margin-top:-0.75rem;">Max 300 characters</p>
          </div>

          <div class="profile-section">
            <label>Email</label>
            <input type="text" id="emailInput" readonly aria-readonly="true">
          </div>

          <div class="profile-section">
            <label for="newPassword">New password <span class="auth-hint">(leave blank to keep current)</span></label>
            <div class="password-wrap">
              <input type="password" id="newPassword" name="new_password" placeholder="••••••••" autocomplete="new-password" maxlength="72">
              <button type="button" class="password-toggle" id="pwToggle" aria-label="Show password"><i class="fas fa-eye" id="pwIcon"></i></button>
            </div>
          </div>

          <button type="submit">Save changes</button>
        </form>

        <div class="profile-logout-wrap">
          <button type="button" class="profile-logout-btn" id="profileLogoutBtn" aria-label="Log out">
            <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Log out
          </button>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function() {
      function hashStr(s) {
        var h = 0;
        for (var i = 0; i < s.length; i++) { h = Math.imul(31, h) + s.charCodeAt(i) | 0; }
        return (h >>> 0).toString(16);
      }

      var token = '';
      try { token = localStorage.getItem('auth_token') || ''; } catch (e) {}
      if (!token) {
        window.location.href = '/pages/login.html?next=' + encodeURIComponent('/pages/profile.html');
        return;
      }

      var currentUser = null;
      try { currentUser = JSON.parse(localStorage.getItem('auth_user') || 'null'); } catch (e) {}
      if (!currentUser) {
        window.location.href = '/pages/login.html?next=' + encodeURIComponent('/pages/profile.html');
        return;
      }

      function setAvatar(url) {
        var img = document.getElementById('avatarImg');
        var container = document.getElementById('avatarContainer');
        if (url) {
          img.src = url;
          img.alt = 'Profile picture';
          container.classList.add('has-image');
        } else {
          img.src = '';
          img.alt = '';
          container.classList.remove('has-image');
        }
      }

      function loadProfile() {
        document.getElementById('profileLoading').hidden = true;
        document.getElementById('profileContent').hidden = false;
        document.getElementById('nameInput').value = currentUser.name || '';
        document.getElementById('emailInput').value = currentUser.email || '';
        document.getElementById('descriptionInput').value = currentUser.description || '';
        setAvatar(currentUser.profile_picture || '');
      }

      function saveUserToStorage(updated) {
        try { localStorage.setItem('auth_user', JSON.stringify(updated)); } catch (e) {}
        var users = [];
        try { users = JSON.parse(localStorage.getItem('auth_users') || '[]'); } catch (e) {}
        for (var i = 0; i < users.length; i++) {
          if (users[i].email === updated.email) {
            users[i].name = updated.name;
            users[i].description = updated.description;
            users[i].profile_picture = updated.profile_picture;
            if (updated.passwordHash) users[i].passwordHash = updated.passwordHash;
            break;
          }
        }
        try { localStorage.setItem('auth_users', JSON.stringify(users)); } catch (e) {}
      }

      document.getElementById('avatarInput').addEventListener('change', function() {
        var file = this.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) {
          alert('Image too large (max 2MB)');
          this.value = '';
          return;
        }
        var reader = new FileReader();
        reader.onload = function(ev) {
          var dataUrl = ev.target.result;
          currentUser.profile_picture = dataUrl;
          setAvatar(dataUrl);
          saveUserToStorage(currentUser);
          var success = document.getElementById('success');
          success.textContent = 'Profile picture updated.';
          success.hidden = false;
          setTimeout(function() { success.hidden = true; }, 3000);
          if (window.opener) window.opener.postMessage({ type: 'auth', user: currentUser }, window.location.origin);
        };
        reader.readAsDataURL(file);
        this.value = '';
      });

      document.getElementById('avatarRemoveBtn').addEventListener('click', function() {
        currentUser.profile_picture = '';
        setAvatar('');
        saveUserToStorage(currentUser);
        var success = document.getElementById('success');
        success.textContent = 'Profile picture removed.';
        success.hidden = false;
        setTimeout(function() { success.hidden = true; }, 3000);
      });

      document.getElementById('profileForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var errEl = document.getElementById('error');
        var successEl = document.getElementById('success');
        errEl.hidden = true;
        successEl.hidden = true;

        var name = document.getElementById('nameInput').value.trim();
        var description = document.getElementById('descriptionInput').value.trim();
        var newPassword = document.getElementById('newPassword').value;

        if (!name) {
          errEl.textContent = 'Name cannot be empty.';
          errEl.hidden = false;
          return;
        }

        currentUser.name = name;
        currentUser.description = description;

        if (newPassword) {
          currentUser.passwordHash = hashStr(newPassword.slice(0, 72));
        }

        saveUserToStorage(currentUser);

        successEl.textContent = 'Profile saved.';
        successEl.hidden = false;
        setTimeout(function() { successEl.hidden = true; }, 3000);
        document.getElementById('newPassword').value = '';

        if (window.opener) window.opener.postMessage({ type: 'auth', user: currentUser }, window.location.origin);
      });

      document.getElementById('profileLogoutBtn').addEventListener('click', function() {
        try {
          localStorage.removeItem('auth_token');
          localStorage.removeItem('auth_user');
        } catch (e) {}
        window.location.href = '/';
      });

      var pw = document.getElementById('newPassword');
      var pwToggle = document.getElementById('pwToggle');
      var pwIcon = document.getElementById('pwIcon');
      if (pwToggle && pw && pwIcon) {
        pwToggle.addEventListener('click', function() {
          var isPw = pw.type === 'password';
          pw.type = isPw ? 'text' : 'password';
          pwIcon.className = isPw ? 'fas fa-eye-slash' : 'fas fa-eye';
        });
      }

      loadProfile();
    })();
  </script>
</body>
</html>
