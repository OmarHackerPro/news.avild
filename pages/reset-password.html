<!doctype html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — news.avild.com</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/main/main.css">
  <link rel="stylesheet" href="/static/css/auth-profile-bg.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"></noscript>
  <style>
    .auth-page { display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .auth-card { width: 100%; max-width: 380px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); }
    .auth-card h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--text); }
    .auth-form label { display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.35rem; }
    .auth-form input { width: 100%; padding: 0.6rem 0.75rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 1rem; margin-bottom: 1rem; box-sizing: border-box; }
    .auth-form .password-wrap { position: relative; margin-bottom: 1rem; }
    .auth-form .password-wrap input { margin-bottom: 0; padding-right: 2.5rem; }
    .auth-form .password-toggle { position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.35rem; border-radius: var(--radius-sm); }
    .auth-form .password-toggle:hover { color: var(--text); }
    .auth-form input:focus { outline: none; border-color: var(--accent-blue); }
    .auth-form button[type="submit"] { width: 100%; padding: 0.7rem; background: var(--accent-green); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
    .auth-form button[type="submit"]:hover { background: #2ea043; }
    .auth-form .error { color: var(--accent-red); font-size: 0.9rem; margin-bottom: 0.75rem; }
    .auth-form .success { color: var(--accent-green); font-size: 0.9rem; margin-bottom: 0.75rem; }
    .auth-footer { margin-top: 1.5rem; text-align: center; }
    .auth-footer a { color: var(--accent-blue); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
  <script>(function(){ try { if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('theme-light'); } catch (e) {} })();</script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg-dots" aria-hidden="true"></div>
    <div class="auth-card">
      <h1>Set new password</h1>
      <form class="auth-form" id="resetForm" method="post" action="#">
        <div class="error" id="error" role="alert" hidden></div>
        <div class="success" id="success" role="status" hidden></div>
        <label for="newPassword">New password</label>
        <div class="password-wrap">
          <input type="password" id="newPassword" name="new_password" placeholder="••••••••" required minlength="8" autocomplete="new-password" maxlength="72">
          <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password"><i class="fas fa-eye" id="passwordToggleIcon" aria-hidden="true"></i></button>
        </div>
        <label for="confirmPassword">Confirm password</label>
        <div class="password-wrap">
          <input type="password" id="confirmPassword" name="confirm_password" placeholder="••••••••" required minlength="8" autocomplete="new-password" maxlength="72">
          <button type="button" class="password-toggle" id="confirmToggle" aria-label="Show password"><i class="fas fa-eye" id="confirmToggleIcon" aria-hidden="true"></i></button>
        </div>
        <button type="submit">Change password</button>
      </form>
      <div class="auth-footer">
        <a href="/pages/login.html">Back to Log in</a>
      </div>
    </div>
  </div>
  <script>
    (function() {
      function hashStr(s) {
        var h = 0;
        for (var i = 0; i < s.length; i++) { h = Math.imul(31, h) + s.charCodeAt(i) | 0; }
        return (h >>> 0).toString(16);
      }

      var params = new URLSearchParams(window.location.search);
      var token = params.get('token') || '';
      var errorEl = document.getElementById('error');
      var successEl = document.getElementById('success');
      var submitBtn = document.getElementById('resetForm').querySelector('button[type="submit"]');

      if (!token) {
        errorEl.textContent = 'Missing reset link. Request a new one from the login page.';
        errorEl.hidden = false;
        submitBtn.disabled = true;
      } else {
        var resets = {};
        try { resets = JSON.parse(localStorage.getItem('auth_reset_tokens') || '{}'); } catch(e) {}
        var entry = resets[token];
        if (!entry || Date.now() > entry.expires) {
          errorEl.textContent = 'This reset link has expired. Please request a new one.';
          errorEl.hidden = false;
          submitBtn.disabled = true;
        }
      }

      function makeToggle(btn, input, icon) {
        if (btn && input && icon) {
          btn.addEventListener('click', function() {
            var isPw = input.type === 'password';
            input.type = isPw ? 'text' : 'password';
            icon.className = isPw ? 'fas fa-eye-slash' : 'fas fa-eye';
          });
        }
      }
      makeToggle(document.getElementById('passwordToggle'), document.getElementById('newPassword'), document.getElementById('passwordToggleIcon'));
      makeToggle(document.getElementById('confirmToggle'), document.getElementById('confirmPassword'), document.getElementById('confirmToggleIcon'));

      document.getElementById('resetForm').addEventListener('submit', function(e) {
        e.preventDefault();
        errorEl.hidden = true;
        successEl.hidden = true;

        var newPw = document.getElementById('newPassword').value;
        var confirm = document.getElementById('confirmPassword').value;

        if (newPw !== confirm) {
          errorEl.textContent = 'Passwords do not match.';
          errorEl.hidden = false;
          return;
        }
        if (newPw.length < 8) {
          errorEl.textContent = 'Password must be at least 8 characters.';
          errorEl.hidden = false;
          return;
        }
        if (newPw.length > 72) newPw = newPw.slice(0, 72);

        var resets = {};
        try { resets = JSON.parse(localStorage.getItem('auth_reset_tokens') || '{}'); } catch(e) {}
        var entry = resets[token];
        if (!entry || Date.now() > entry.expires) {
          errorEl.textContent = 'This reset link has expired. Please request a new one.';
          errorEl.hidden = false;
          return;
        }

        var email = entry.email;
        var users = [];
        try { users = JSON.parse(localStorage.getItem('auth_users') || '[]'); } catch(e) {}
        for (var i = 0; i < users.length; i++) {
          if (users[i].email === email) {
            users[i].passwordHash = hashStr(newPw);
            break;
          }
        }
        try { localStorage.setItem('auth_users', JSON.stringify(users)); } catch(e) {}

        delete resets[token];
        try { localStorage.setItem('auth_reset_tokens', JSON.stringify(resets)); } catch(e) {}

        successEl.textContent = 'Password updated. Redirecting to log in…';
        successEl.hidden = false;
        submitBtn.disabled = true;
        setTimeout(function() { window.location.href = '/pages/login.html'; }, 2000);
      });
    })();
  </script>
</body>
</html>
