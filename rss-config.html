<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>RSS Feed - CyberNews</title>
  <link rel="stylesheet" href="/static/css/main/main.css">
  <link rel="stylesheet" href="/static/css/layout/navbar.css">
  <link rel="stylesheet" href="/static/css/pages/rss-config.css">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <style>
    .navbar { display: flex !important; flex-direction: column !important; }
    .nav-top, .nav-bottom, .nav-actions, .nav-links { display: flex !important; visibility: visible !important; opacity: 1 !important; }
    .nav-links { overflow-x: auto !important; }
  </style>
  <script>
    (function() {
      try {
        if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('theme-light');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-top">
      <div class="lang-select-wrapper">
        <select id="langSelect" class="lang-select-native" aria-label="Language">
          <option value="en" selected>English</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="ja">日本語</option>
          <option value="zh">中文</option>
          <option value="ru">Русский</option>
          <option value="ar">العربية</option>
          <option value="az">Azərbaycan</option>
        </select>
        <div class="lang-select-trigger" id="langTrigger" aria-expanded="false" aria-haspopup="listbox">
          <i class="fas fa-globe lang-icon"></i>
          <span class="lang-current" data-short="EN">EN</span>
          <i class="fas fa-chevron-down lang-arrow"></i>
        </div>
        <div class="lang-dropdown" id="langDropdown" role="listbox">
          <div class="lang-option selected" data-lang="en" data-short="EN" role="option">English</div>
          <div class="lang-option" data-lang="es" data-short="ES" role="option">Español</div>
          <div class="lang-option" data-lang="fr" data-short="FR" role="option">Français</div>
          <div class="lang-option" data-lang="de" data-short="DE" role="option">Deutsch</div>
          <div class="lang-option" data-lang="ja" data-short="JA" role="option">日本語</div>
          <div class="lang-option" data-lang="zh" data-short="ZH" role="option">中文</div>
          <div class="lang-option" data-lang="ru" data-short="RU" role="option">Русский</div>
          <div class="lang-option" data-lang="ar" data-short="AR" role="option">العربية</div>
          <div class="lang-option" data-lang="az" data-short="AZ" role="option">Azərbaycan</div>
        </div>
      </div>
      <div class="nav-actions">
        <a href="preferences.html" class="nav-subscribe-btn nav-pref-link"><i class="fas fa-layer-group"></i> <span data-i18n-key="nav.myStack">My Stack</span></a>
        <a href="webhooks.html" class="nav-subscribe-btn nav-pref-link"><i class="fas fa-plug"></i> <span data-i18n-key="nav.webhooks">Webhooks</span></a>
        <a href="rss-config.html" class="nav-subscribe-btn nav-pref-link active"><i class="fas fa-rss"></i> <span data-i18n-key="nav.rssConfig">RSS Feed</span></a>
        <button type="button" class="nav-theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
          <span class="theme-icon">
            <svg class="theme-icon-sun" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.5" fill="currentColor"/><line x1="12" y1="12" x2="12" y2="2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="12" y1="12" x2="12" y2="22" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="12" y1="12" x2="2" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="12" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="12" y1="12" x2="5" y2="5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="12" y1="12" x2="19" y2="19" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="12" y1="12" x2="19" y2="5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="12" y1="12" x2="5" y2="19" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            <svg class="theme-icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
        </button>
      </div>
    </div>
    <div class="nav-bottom">
      <a href="index.html" class="nav-brand">
        <span class="brand-logo-box"><i class="fas fa-shield-alt brand-icon"></i></span>
        <span class="brand-text"><span class="brand-cyber">Cyber</span><span class="brand-news">News</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="search.html"><i class="fas fa-search nav-link-icon"></i> <span data-i18n-key="nav.search">Search</span></a></li>
        <li><a href="index.html"><i class="fas fa-home nav-link-icon"></i> Home</a></li>
      </ul>
    </div>
  </nav>

  <main class="layout">
    <div class="content-area rss-config-page">
      <h1 id="rss-page-title"><i class="fas fa-rss"></i> <span data-i18n-key="rss.title">RSS Feed configuration</span></h1>

      <section class="rss-section" aria-labelledby="include-title">
        <h2 id="include-title" class="rss-section-title"><i class="fas fa-th-list"></i> <span data-i18n-key="rss.includeLabel">What's included</span></h2>
        <div id="rssInclude" class="rss-include-list">
          <label><input type="checkbox" name="include" value="myStack" checked> <span data-i18n-key="rss.includeMyStack">My Stack</span></label>
          <label><input type="checkbox" name="include" value="digest" checked> <span data-i18n-key="rss.includeDigest">Digest</span></label>
          <label><input type="checkbox" name="include" value="saved" checked> <span data-i18n-key="rss.includeSaved">Saved Entities</span></label>
        </div>
      </section>

      <section class="rss-section" aria-labelledby="filters-title">
        <h2 id="filters-title" class="rss-section-title"><i class="fas fa-filter"></i> <span data-i18n-key="rss.filtersLabel">Filters</span></h2>
        <div id="rssFilters" class="rss-filters">
          <div class="rss-filter-group">
            <label for="rssFilterTags"><span data-i18n-key="rss.tags">Tags</span></label>
            <select id="rssFilterTags">
              <option value="">All</option>
              <option value="cve">CVE</option>
              <option value="ransomware">Ransomware</option>
              <option value="apt">APT</option>
            </select>
          </div>
          <div class="rss-filter-group">
            <label for="rssFilterSources"><span data-i18n-key="rss.sources">Sources</span></label>
            <select id="rssFilterSources">
              <option value="">All</option>
              <option value="news">News</option>
              <option value="analysis">Analysis</option>
            </select>
          </div>
          <div class="rss-filter-group">
            <label for="rssFilterFreq"><span data-i18n-key="rss.frequency">Frequency</span></label>
            <select id="rssFilterFreq">
              <option value="">Default</option>
              <option value="realtime">Realtime</option>
              <option value="hourly">Hourly</option>
              <option value="daily">Daily</option>
            </select>
          </div>
          <div class="rss-filter-group">
            <label for="rssFilterLang"><span data-i18n-key="rss.language">Language</span></label>
            <select id="rssFilterLang">
              <option value="">All</option>
              <option value="en">English</option>
              <option value="es">Español</option>
              <option value="de">Deutsch</option>
            </select>
          </div>
        </div>
      </section>

      <section class="rss-section" aria-labelledby="output-title">
        <h2 id="output-title" class="rss-section-title"><i class="fas fa-link"></i> <span data-i18n-key="rss.feedUrl">Feed URL</span></h2>
        <div class="rss-output">
          <p class="rss-output-label" data-i18n-key="rss.feedUrl">Feed URL</p>
          <div class="rss-url-row">
            <input type="text" id="rssFeedUrl" readonly aria-label="RSS feed URL">
            <button type="button" id="rssCopyUrl" class="btn-copy" data-i18n-key="rss.copyUrl">Copy URL</button>
          </div>
          <p class="rss-token-note" data-i18n-key="rss.tokenNote">Private feed token. Rotating invalidates the previous link.</p>
          <div class="rss-regenerate-wrap">
            <button type="button" id="rssRegenerateToken" class="btn-secondary" data-i18n-key="rss.regenerateToken">Regenerate token</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="/static/js/data/translations.js"></script>
  <script src="/static/js/components/nav.js"></script>
  <script src="/static/js/components/language.js"></script>
  <script src="/static/js/components/theme.js"></script>
  <script src="/static/js/data/rss-config.js"></script>
  <script src="/static/js/features/rss-config-page.js"></script>
</body>
</html>
