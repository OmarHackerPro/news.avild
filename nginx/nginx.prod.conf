upstream backend {
    server backend:8000;
}

server {
    listen 80;
    client_max_body_size 5m;

    # ── Disabled page routes — redirect to coming-soon ────────────────────────
    location ~ ^/(preferences|webhooks|rss-config|digest|login|signup|forgot-password|reset-password|profile)(/.*)?$ {
        return 302 /coming-soon;
    }

    # ── Disabled API routes — hard 404 (no redirect for JSON consumers) ───────
    location ~ ^/api/(auth|preferences|digest|feeds)(/.*)?$ {
        return 404;
    }

    location = /api/rss {
        return 404;
    }

    # ── Docs disabled in prod ─────────────────────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json)$ {
        return 404;
    }

    # ── Static assets — long-lived cache in prod ──────────────────────────────
    location /static/ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── API ───────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── HTML pages ────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache";
    }
}
