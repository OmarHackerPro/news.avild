upstream backend {
    server backend:8000;
}

server {
    listen 80;
    client_max_body_size 5m;

    # Serve static assets directly with caching
    location /static/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to FastAPI backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Auth pages
    location = /login { root /usr/share/nginx/html; try_files /login.html =404; }
    location = /signup { root /usr/share/nginx/html; try_files /signup.html =404; }
    location = /forgot-password { root /usr/share/nginx/html; try_files /forgot-password.html =404; }
    location = /reset-password { root /usr/share/nginx/html; try_files /reset-password.html =404; }
    location = /profile { root /usr/share/nginx/html; try_files /profile.html =404; }

    # Serve category page
    location /category {
        root /usr/share/nginx/html;
        try_files /category.html =404;
    }

    # Serve index page for everything else
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
