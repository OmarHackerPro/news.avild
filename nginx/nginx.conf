upstream backend {
    server backend:8000;
}

server {
    listen 80;
    client_max_body_size 5m;

    # Serve static assets directly — no long-term cache in dev
    location /static/ {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Proxy API calls to FastAPI backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # FastAPI docs
    location /docs { proxy_pass http://backend; }
    location /redoc { proxy_pass http://backend; }
    location /openapi.json { proxy_pass http://backend; }

    # All HTML pages — proxied to FastAPI so each response carries per-page SEO
    # (title, description, canonical, JSON-LD) rendered server-side. nginx no
    # longer touches HTML; that's the backend's job now.
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache";
    }
}
